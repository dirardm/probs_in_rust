<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 160 124"
  width="320" height="248"
  role="img"
  aria-label="ObligaI logo compact light">
  <rect width="160" height="124" fill="#FAF7F4"/>

  <!-- Node mark — identical to primary -->
  <line x1="80" y1="46" x2="80" y2="34"
    stroke="#B85C3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="89" y1="61" x2="99" y2="67"
    stroke="#B85C3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="71" y1="61" x2="61" y2="67"
    stroke="#B85C3A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="80" cy="56" r="10" fill="#B85C3A"/>
  <circle cx="80"  cy="28" r="6"
    fill="none" stroke="#B85C3A" stroke-width="3"/>
  <circle cx="104" cy="70" r="6"
    fill="none" stroke="#B85C3A" stroke-width="3"/>
  <circle cx="56"  cy="70" r="6"
    fill="none" stroke="#B85C3A" stroke-width="3"/>

  <!--
    COMPACT WORDMARK
    Georgia Italic I restored — serifs give it letter identity,
    the italic angle leans into Obliga rather than floating away.
    dx="-0.12em" (3× tighter than primary's -0.04em):
    closes the Inter→Georgia font-switch optical gap at small sizes.
    Use between 24px and 48px rendered height.
  -->
  <text
    x="80" y="108"
    text-anchor="middle"
    font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif"
    font-weight="500"
    font-size="24"
    fill="#0F0F0F"
    letter-spacing="-0.3">Obliga<tspan
      font-family="Georgia, 'Times New Roman', serif"
      font-style="italic"
      fill="#B85C3A"
      dx="-0.12em">I</tspan></text>

</svg>
